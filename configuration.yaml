
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /local/card-mod.js

homeassistant:
  customize: !include customize.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Template sensors
template:
  - sensor:
      - name: "Gate WiFi Signal"
        state: >-
          {% set val = states('sensor.gate_controller_wifi_rssi') %}
          {% if val in ['unavailable', 'unknown'] %}
            {{ none }}
          {% else %}
            {{ val | float }}
          {% endif %}
        unit_of_measurement: "dBm"
        availability: "{{ states('sensor.gate_controller_wifi_rssi') not in ['unavailable', 'unknown'] }}"
        icon: >-
          {% set rssi = states('sensor.gate_controller_wifi_rssi') | float(-100) %}
          {% if rssi >= -50 %}
            mdi:wifi-strength-4
          {% elif rssi >= -60 %}
            mdi:wifi-strength-3
          {% elif rssi >= -70 %}
            mdi:wifi-strength-2
          {% elif rssi >= -80 %}
            mdi:wifi-strength-1
          {% else %}
            mdi:wifi-strength-alert-outline
          {% endif %}
